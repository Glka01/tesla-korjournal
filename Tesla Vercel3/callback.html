<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Tesla Inloggning...</title>
<style>
body { background: #0d0d0d; color: #ececec; font-family: -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
.box { text-align: center; }
.spinner { width: 40px; height: 40px; border: 3px solid #2c2c2c; border-top-color: #e31937;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
h2 { font-size: 18px; margin-bottom: 8px; }
p { color: #777; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h2>Loggar in med Tesla...</h2>
  <p>Du skickas tillbaka till körjournalen automatiskt.</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const state = params.get('state');
if (code) {
  localStorage.setItem('ts_oauth_code', code);
  localStorage.setItem('ts_oauth_state', state || '');
  window.location.replace('/');
} else {
  document.querySelector('h2').textContent = 'Något gick fel';
  document.querySelector('p').textContent = 'Ingen kod mottagen från Tesla. Försök igen.';
  document.querySelector('.spinner').style.display = 'none';
}
</script>
</body>
</html>
